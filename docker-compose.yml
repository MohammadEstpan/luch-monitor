services:
  luch-monitor:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persistent storage for tasks, acks, integrations config
      - ./data:/app/backend/data
    environment:
      - TZ=Asia/Yekaterinburg   # UTC+5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/version"]
      interval: 30s
      timeout: 5s
      retries: 3
